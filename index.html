<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸福家大泡成交美化助手</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --xingfu-red: #e60012;
            --bg-color: #f7f9fc;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 25px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--xingfu-red);
            margin-bottom: 20px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .mode-indicator {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            height: 20px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #eaedf2;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        textarea:focus {
            border-color: var(--xingfu-red);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-gold {
            background: var(--gold-gradient);
            color: #333;
            box-shadow: 0 4px 15px rgba(180, 140, 40, 0.3);
        }

        .btn-copy {
            background-color: #25d366;
            color: white;
        }

        button:active {
            transform: scale(0.97);
        }

        .output-box {
            background-color: #fffdf2;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 17px;
            color: #2c3e50;
            min-height: 100px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 幸福家菁英成交助手</h2>
    <div id="modeStatus" class="mode-indicator">輸入文字自動偵測成交規格...</div>
    
    <textarea id="inputText" oninput="detectMode()" placeholder="請貼上成交內容，例如：&#10;湖美店大泡成交通知&#10;案名：..."></textarea>

    <div class="btn-group">
        <button class="btn-gold" onclick="generate()">✨ 豪華美化生成</button>
        <button class="btn-copy" onclick="copyText()">📋 複製發送</button>
    </div>

    <div id="resultBox" class="output-box">美化結果將顯示於此...</div>
</div>

<script>
    // 符號池定義
    const emojis = {
        normalTitle: ["✨", "🎊", "🎉", "🔥"],
        bigTitle: ["👑", "💎", "🏆", "🌟", "📣", "🎊", "🏮"],
        arrows: ["🚩", "➡️", "📍", "🎯", "⚡"],
        checks: ["✅", "✔️", "🎖️", "💪", "💯"],
        dates: ["🐣", "🗓️", "☀️", "⏰"],
        luxury: ["💰", "💎", "🥂", "🧧", "🌈", "🔥", "🚀", "🧨"]
    };

    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function detectMode() {
        const text = document.getElementById('inputText').value;
        const status = document.getElementById('modeStatus');
        if (text.includes("大泡")) {
            status.innerHTML = "<b style='color:#b38728;'>🔥 已偵測：【大泡成交】模式（自動開啟豪華裝飾）</b>";
        } else {
            status.innerText = "一般成交模式";
        }
    }

    function generate() {
        const raw = document.getElementById('inputText').value.trim();
        if (!raw) return;

        const isBig = raw.includes("大泡");
        const lines = raw.split('\n');
        
        const processed = lines.map((line, i) => {
            let content = line.trim();
            if (!content) return "";

            // 1. 標題行
            if (i === 0) {
                const icon = isBig ? pick(emojis.bigTitle) : pick(emojis.normalTitle);
                return `${icon}${content}${icon}`;
            }

            // 2. 案名
            if (content.includes("案名")) {
                return `${pick(emojis.arrows)} ${content}`;
            }

            // 3. 人員 (開發、銷售)
            if (content.includes("開發") || content.includes("銷售")) {
                return `${pick(emojis.checks)} ${content}`;
            }

            // 4. 時間
            if (content.includes("日期") || content.includes("時間") || content.includes("成交")) {
                return `${pick(emojis.dates)} ${content}`;
            }

            // 5. 祝賀詞或結尾
            if (content.includes("祝") || content.includes("賀") || isBig) {
                const suffix = isBig ? `${pick(emojis.luxury)}${pick(emojis.luxury)}` : pick(emojis.luxury);
                return `${content} ${suffix}`;
            }

            return `🔹 ${content}`;
        });

        document.getElementById('resultBox').innerText = processed.join('\n');
    }

    async function copyText() {
        const text = document.getElementById('resultBox').innerText;
        await navigator.clipboard.writeText(text);
        alert("複製成功！祝您案源不斷，冒泡連連！");
    }
</script>

</body>
</html>
