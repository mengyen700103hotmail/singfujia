<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸福家成交助手 V1.4</title>
    <style>
        :root {
            --xingfu-red: #e60012;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--xingfu-red);
            margin-bottom: 5px;
        }

        .status-bar {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            height: 20px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 15px;
        }

        textarea:focus {
            border-color: var(--xingfu-red);
        }

        .btn-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-gen {
            background-color: var(--xingfu-red);
            color: white;
        }

        .btn-clear {
            background-color: #6c757d;
            color: white;
        }

        .btn-copy {
            background-color: #28a745;
            color: white;
            width: 100%;
        }

        button:active {
            transform: scale(0.96);
        }

        .result-area {
            margin-top: 20px;
            background-color: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 16px;
            color: #333;
        }

        #msg {
            text-align: center;
            font-size: 12px;
            color: #28a745;
            height: 20px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 幸福家成交助手</h2>
    <div id="modeDisplay" class="status-bar">請輸入成交資訊...</div>
    
    <textarea id="inputArea" oninput="checkMode()" placeholder="請在此貼上成交訊息內容..."></textarea>

    <div class="btn-row">
        <button class="btn-gen" onclick="generate()">✨ 產生美化訊息</button>
        <button class="btn-clear" onclick="doClear()">🗑️ 清除內容</button>
    </div>
    
    <button class="btn-copy" onclick="doCopy()">📋 複製結果 (免跳窗)</button>
    <div id="msg"></div>

    <div id="outputArea" class="result-area">結果將顯示於此...</div>
</div>

<script>
    // 嚴選符號庫
    const pool = {
        title: ["✨", "🎊", "🎉", "🔥", "🌟", "👑"],
        arrows: ["➔", "⏩", "⏬", "🚩", "📍"], // 強制加入要求的符號
        checks: ["✅", "✔️", "🎖️", "🏆", "💪"],
        dates: ["🐣", "🗓️", "☀️", "⏰"],
        luxury: ["💎", "🥂", "🥳", "🌈", "🔥", "🚀", "🧨", "🎊"] // 移除金錢相關
    };

    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function checkMode() {
        const text = document.getElementById('inputArea').value;
        const mode = document.getElementById('modeDisplay');
        if (text.includes("大泡")) {
            mode.innerHTML = "<b style='color:orange;'>🔥 大泡成交模式：華麗度加倍！</b>";
        } else {
            mode.innerText = "一般成交模式";
        }
        document.getElementById('msg').innerText = "";
    }

    function doClear() {
        document.getElementById('inputArea').value = "";
        document.getElementById('outputArea').innerText = "結果將顯示於此...";
        document.getElementById('modeDisplay').innerText = "請輸入成交資訊...";
        document.getElementById('msg').innerText = "";
    }

    function generate() {
        const raw = document.getElementById('inputArea').value.trim();
        if (!raw) return;

        const isBig = raw.includes("大泡");
        const lines = raw.split('\n');
        
        const result = lines.map((line, i) => {
            let content = line.trim();
            if (!content) return "";

            // 第一行標題
            if (i === 0) {
                const em = isBig ? "👑" : pick(pool.title);
                return `${em} ${content} ${em}`;
            }

            // 案名 (優先使用 紅箭頭)
            if (content.includes("案名")) {
                return `➔ ${content}`;
            }

            // 開發/銷售 (使用 雙箭頭右 或 勾選)
            if (content.includes("開發") || content.includes("銷售")) {
                return `⏩ ${content}`;
            }

            // 日期/時間 (使用 雙箭頭下 或 時鐘)
            if (content.includes("日期") || content.includes("時間") || content.includes("成交")) {
                return `⏬ ${content}`;
            }

            // 結尾/祝賀
            if (content.includes("祝") || content.includes("賀") || isBig) {
                const deco = isBig ? `${pick(pool.luxury)}${pick(pool.luxury)}` : pick(pool.luxury);
                return `${content} ${deco}`;
            }

            return `🔹 ${content}`;
        });

        document.getElementById('outputArea').innerText = result.join('\n');
    }

    async function doCopy() {
        const text = document.getElementById('outputArea').innerText;
        if (text.includes("結果將顯示")) return;

        try {
            await navigator.clipboard.writeText(text);
            const msg = document.getElementById('msg');
            msg.innerText = "✅ 已複製！直接去 LINE 貼上即可。";
            setTimeout(() => { msg.innerText = ""; }, 3000);
        } catch (e) {
            console.error(e);
        }
    }
</script>

</body>
</html>
