<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸福家成交訊息美化助手</title>
    <style>
        :root {
            --primary-color: #e60012; /* 幸福家企業色意象 */
            --bg-color: #f4f4f9;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.5rem;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 1rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-generate {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-generate:hover {
            background-color: #b3000e;
        }

        .btn-copy {
            background-color: #28a745;
            color: white;
        }

        .btn-copy:hover {
            background-color: #218838;
        }

        .output-area {
            margin-top: 1.5rem;
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            border: 1px dashed #adb5bd;
            white-space: pre-wrap; /* 保留換行 */
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.6;
        }

        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ 成交訊息美化助手</h2>
    
    <textarea id="inputChat" placeholder="請貼上成交訊息，例如：&#10;塩行店大泡成交通知&#10;案名：...&#10;開發：..."></textarea>

    <div class="button-group">
        <button class="btn-generate" onclick="beautifyText()">✨ 自動美化</button>
        <button class="btn-copy" onclick="copyToClipboard()">📋 複製結果</button>
    </div>

    <div id="outputArea" class="output-area">美化後的結果會顯示在這裡...</div>
    <p class="hint">提示：程式會自動辨識關鍵字並隨機分配適合的表情符號。</p>
</div>

<script>
    // 定義適合不動產成交氛圍的表情符號庫
    const emojiLib = {
        title: ["✨", "🎊", "🎉", "🔥", "💎"],
        caseName: ["➡️", "🏠", "🏢", "📍"],
        person: ["✔️", "👤", "💼", "🤝"],
        date: ["🐣", "📅", "⏰", "☀️"],
        footer: ["🥳", "㊗️", "🥂", "💰", "🌈"]
    };

    /**
     * 隨機取得陣列中的一個元素
     */
    function getRandom(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    /**
     * 核心邏輯：美化文字
     */
    function beautifyText() {
        const input = document.getElementById('inputChat').value.trim();
        if (!input) {
            alert("請先輸入文字內容喔！");
            return;
        }

        let lines = input.split('\n');
        let processedLines = lines.map((line, index) => {
            line = line.trim();
            if (line === "") return "";

            // 1. 第一行通常是標題
            if (index === 0) {
                const em = getRandom(emojiLib.title);
                return `${em}${line}${em}`;
            }

            // 2. 案名
            if (line.includes("案名")) {
                return `${getRandom(emojiLib.caseName)}${line}`;
            }

            // 3. 開發或銷售
            if (line.includes("開發") || line.includes("銷售")) {
                return `${getRandom(emojiLib.person)}${line}`;
            }

            // 4. 日期或時間
            if (line.includes("日期") || line.includes("時間") || line.includes("成交")) {
                return `${getRandom(emojiLib.date)}${line}`;
            }

            // 5. 結尾祝賀語
            if (line.includes("祝") || line.includes("賀")) {
                return `${line}${getRandom(emojiLib.footer)}`;
            }

            // 其他行數隨機給予一個點綴
            return `🔹 ${line}`;
        });

        const result = processedLines.join('\n');
        document.getElementById('outputArea').innerText = result;
    }

    /**
     * 複製到剪貼簿
     */
    function copyToClipboard() {
        const text = document.getElementById('outputArea').innerText;
        if (text === "美化後的結果會顯示在這裡...") return;

        navigator.clipboard.writeText(text).then(() => {
            alert("已複製到剪貼簿，可以去 LINE 貼上囉！");
        }).catch(err => {
            console.error('無法複製', err);
        });
    }
</script>

</body>
</html>
