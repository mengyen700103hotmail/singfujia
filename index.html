<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸福家大泡成交助手 V1.3</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --xingfu-red: #e60012;
            --bg-color: #f7f9fc;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 25px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: var(--xingfu-red);
            margin-bottom: 5px;
            font-size: 22px;
        }

        .mode-indicator {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
            height: 20px;
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 15px;
            border: 2px solid #eaedf2;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            margin-bottom: 15px;
            background-color: #fff;
        }

        textarea:focus {
            border-color: var(--xingfu-red);
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-full {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-gold {
            background: var(--gold-gradient);
            color: #333;
            flex: 2;
        }

        .btn-clear {
            background-color: #6c757d;
            color: white;
            flex: 1;
        }

        .btn-copy {
            background-color: #25d366;
            color: white;
            width: 100%;
        }

        button:active {
            transform: scale(0.96);
        }

        .output-box {
            background-color: #fffdf2;
            border: 1px solid #ffeeba;
            border-radius: 12px;
            padding: 20px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 17px;
            color: #2c3e50;
            min-height: 100px;
            position: relative;
        }

        #copyStatus {
            text-align: center;
            font-size: 12px;
            color: #28a745;
            margin-top: 5px;
            height: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 幸福家菁英成交助手</h2>
    <div id="modeStatus" class="mode-indicator">等待輸入...</div>
    
    <textarea id="inputText" oninput="detectMode()" placeholder="請貼上成交內容..."></textarea>

    <div class="btn-grid">
        <button class="btn-gold" onclick="generate()">✨ 豪華美化生成</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ 清除</button>
    </div>
    
    <button class="btn-copy" onclick="copyText()">📋 複製結果 (免跳窗)</button>
    <div id="copyStatus"></div>

    <div id="resultBox" class="output-box">美化結果將顯示於此...</div>
</div>

<script>
    const emojis = {
        normalTitle: ["✨", "🎊", "🎉", "🔥"],
        bigTitle: ["👑", "💎", "🏆", "🌟", "📣", "🎊", "🏮"],
        arrows: ["🚩", "➡️", "📍", "🎯", "⚡"],
        checks: ["✅", "✔️", "🎖️", "💪", "💯"],
        dates: ["🐣", "🗓️", "☀️", "⏰"],
        luxury: ["💰", "💎", "🥂", "🧧", "🌈", "🔥", "🚀", "🧨"]
    };

    function pick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // 偵測是否為大泡模式
    function detectMode() {
        const text = document.getElementById('inputText').value;
        const status = document.getElementById('modeStatus');
        if (text.includes("大泡")) {
            status.innerHTML = "<b style='color:#b38728;'>🔥 已偵測：【大泡成交】模式（豪華裝飾啟動）</b>";
        } else {
            status.innerText = "一般成交模式";
        }
        document.getElementById('copyStatus').innerText = ""; // 重置複製狀態
    }

    // 清除功能
    function clearAll() {
        document.getElementById('inputText').value = "";
        document.getElementById('resultBox').innerText = "美化結果將顯示於此...";
        document.getElementById('modeStatus').innerText = "等待輸入...";
        document.getElementById('copyStatus').innerText = "";
    }

    // 生成美化文字
    function generate() {
        const raw = document.getElementById('inputText').value.trim();
        if (!raw) return;

        const isBig = raw.includes("大泡");
        const lines = raw.split('\n');
        
        const processed = lines.map((line, i) => {
            let content = line.trim();
            if (!content) return "";

            // 第一行標題
            if (i === 0) {
                const icon = isBig ? pick(emojis.bigTitle) : pick(emojis.normalTitle);
                return `${icon} ${content} ${icon}`;
            }

            // 案名
            if (content.includes("案名")) {
                return `${pick(emojis.arrows)} ${content}`;
            }

            // 開發/銷售
            if (content.includes("開發") || content.includes("銷售")) {
                return `${pick(emojis.checks)} ${content}`;
            }

            // 時間日期
            if (content.includes("日期") || content.includes("時間") || content.includes("成交")) {
                return `${pick(emojis.dates)} ${content}`;
            }

            // 祝賀語
            if (content.includes("祝") || content.includes("賀") || isBig) {
                const suffix = isBig ? `${pick(emojis.luxury)}${pick(emojis.luxury)}` : pick(emojis.luxury);
                return `${content} ${suffix}`;
            }

            return `🔹 ${content}`;
        });

        document.getElementById('resultBox').innerText = processed.join('\n');
        document.getElementById('copyStatus').innerText = ""; 
    }

    // 複製功能 (移除 Alert)
    async function copyText() {
        const text = document.getElementById('resultBox').innerText;
        if (text.includes("美化結果")) return;

        try {
            await navigator.clipboard.writeText(text);
            const status = document.getElementById('copyStatus');
            status.innerText = "✅ 已成功複製到剪貼簿！";
            // 3秒後自動消失提示文字
            setTimeout(() => { status.innerText = ""; }, 3000);
        } catch (err) {
            console.error('複製失敗', err);
        }
    }
</script>

</body>
</html>
